# corpus/brand-system/identity/palette.yaml
# Machine-readable Neural Architect palette and typography spec.
# Source: skills/graphic-design/SKILL.md
# Cross-reference: corpus/brand-system/identity/color-palette.md,
#                  corpus/brand-system/identity/accent-colors.md,
#                  corpus/brand-system/identity/typography-rules.md,
#                  corpus/brand-system/identity/color-anti-patterns.md

backgrounds:
  primary: "#0a0a0a"               # near-black, hero/full-bleed surfaces
  primary_range_max: "#1a1a1a"     # upper bound of the near-black range, slide bodies
  secondary: "#2a2a2a"             # cards, panels, lifted surfaces

text:
  primary: "#f5f5f5"               # high-contrast white, headlines and body
  secondary: "#a0a0a0"             # muted gray, captions and metadata only

accents:
  # One accent per project. Never use more than one in the same asset.
  electric_blue: "#3b82f6"         # default data/AI-architecture accent
  emerald_green: "#10b981"         # growth, health, positive deltas
  amber: "#f59e0b"                 # risk, gaps, "what most people miss"

anti_patterns:
  # Categorically banned from every Riché asset.
  - pastels                        # mint, peach, lavender, baby blue
  - decorative_gradients           # gradient backgrounds, gradient text, gradient buttons
  - neon                           # hot pink, cyber-cyan, electric purple
  - pure_black                     # use #0a0a0a, never #000000
  - pure_white                     # use #f5f5f5, never #ffffff
  - multi_accent_same_asset        # one accent per project, full stop

typography:
  body_sans:
    - "Inter"
    - "system-ui"
    - "-apple-system"
    - "Segoe UI"
    - "Roboto"
  technical_mono:
    - "JetBrains Mono"
    - "Fira Code"
    - "Menlo"
    - "Consolas"
  blacklist:
    - "script fonts"               # Pacifico, Dancing Script, etc.
    - "decorative fonts"           # novelty display faces
    - "hand-drawn fonts"           # fake-handwritten faces
    - "slab serifs with personality"
    - "third font in any asset"    # the system is two-font, full stop

scale:
  # Reference sizes; specific assets may vary within these bands.
  slide_headline_pt: [48, 64]
  slide_body_pt: [24, 32]
  diagram_label_px: [14, 18]
  social_min_readable_px: 14       # at 375px viewport width
  body_weight: 400
  emphasis_weight: 500
  headline_weight: 600
  hero_weight: 700                 # use sparingly

contrast:
  # WCAG targets the palette is calibrated against.
  primary_text_on_primary_bg_ratio: 18.0   # #f5f5f5 on #0a0a0a, AAA
  secondary_text_min_ratio: 4.5            # AA for non-body uses only
  body_must_use_primary_text: true         # secondary gray is never body copy

logo_feel:
  reference_neighborhood:
    - "GitHub icon"
    - "Vercel mark"
    - "Linear icon"
    - "Raycast icon"
    - "Anthropic mark"
  rules:
    - "geometric, not typographic"
    - "monochromatic at favicon size"
    - "holds at 16x16"
    - "no drop shadows, gradients, or chrome treatments"
