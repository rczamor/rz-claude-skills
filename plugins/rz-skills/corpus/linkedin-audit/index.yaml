# corpus/linkedin-audit/index.yaml
# Flat index of every entry in this domain for skill-driven lookup.
# Entry count: 21 across 5 sub-domain(s).
# Schema per entry: filename (relative to corpus/linkedin-audit/), sub_domain, entry_type, one_liner.

domain: linkedin-audit
description: Knowledge for the rz-linkedin-audit skill — monthly audit of Riché Zamor's LinkedIn presence across Reach & Velocity, Audience Composition, Thesis Resonance, Conversion & North Star, Competitive Benchmarking, and Voice & Brand Hygiene. Reads the monthly LinkedIn Creator Analytics export from Drive, updates a Master Tracker spreadsheet, produces a Notion audit page, and seeds Linear tasks.

entries:

  # ============================================================
  # methodology (8 entries)
  # ============================================================
  - filename: methodology/bootstrap.md
    sub_domain: methodology
    entry_type: pattern
    one_liner: "Step 1: verify MCP connectors, locate latest export + diff baseline, read Master Tracker state, initialize findings buffer."
  - filename: methodology/export-parsing.md
    sub_domain: methodology
    entry_type: pattern
    one_liner: "Step 2: parse 5 sections of the LinkedIn Creator Analytics export — DISCOVERY, ENGAGEMENT, TOP POSTS (×2), FOLLOWERS, DEMOGRAPHICS."
  - filename: methodology/master-tracker-update.md
    sub_domain: methodology
    entry_type: pattern
    one_liner: "Step 3: upsert Posts Master, append Snapshots and Monthly Summary rows. Append-only discipline for time series."
  - filename: methodology/pillar-analysis.md
    sub_domain: methodology
    entry_type: pattern
    one_liner: "Step 4: run the 6 pillars in fixed order, write findings to severity-tagged buffer."
  - filename: methodology/deep-dive-candidate-selection.md
    sub_domain: methodology
    entry_type: pattern
    one_liner: "Step 5: pick Top 5 Deep Dive candidates per the active DEEP_DIVE_CRITERION. Surface only; do not enrich."
  - filename: methodology/report-assembly.md
    sub_domain: methodology
    entry_type: template
    one_liner: "Step 7: assemble the Notion page in memory. Compute headline color per the rules. No Notion writes here."
  - filename: methodology/task-issuance.md
    sub_domain: methodology
    entry_type: pattern
    one_liner: "Step 8: issue 0-3 Linear tasks for top P0+P1 findings. Create-then-update pattern."
  - filename: methodology/slack-notification.md
    sub_domain: methodology
    entry_type: template
    one_liner: "Step 10: one-line traffic-light headline to #brand. Index card + link, never the body."

  # ============================================================
  # pillars (6 entries)
  # ============================================================
  - filename: pillars/p1-reach-velocity.md
    sub_domain: pillars
    entry_type: rule
    one_liner: "Cadence (5x/week target) and reach trend. Owns parse-anomaly P0 fires."
  - filename: pillars/p2-audience-composition.md
    sub_domain: pillars
    entry_type: rule
    one_liner: "ICP match (Senior+Director+CXO+Owner) and demographics drift detection."
  - filename: pillars/p3-thesis-resonance.md
    sub_domain: pillars
    entry_type: rule
    one_liner: "Engagement by domain vs 50/30/20 target. The most strategically loaded pillar."
  - filename: pillars/p4-conversion-north-star.md
    sub_domain: pillars
    entry_type: rule
    one_liner: "Inbound by category from manual log. Content-cited inbound is the gold signal."
  - filename: pillars/p5-competitive-benchmarking.md
    sub_domain: pillars
    entry_type: rule
    one_liner: "Direct + Aspirational tier scan via web fetches. Informational only — no P0/P1 fires."
  - filename: pillars/p6-voice-brand-hygiene.md
    sub_domain: pillars
    entry_type: rule
    one_liner: "Fatal Fifteen lint on 4 random posts + profile section freshness audit."

  # ============================================================
  # views (3 entries)
  # ============================================================
  - filename: views/compounders.md
    sub_domain: views
    entry_type: framework
    one_liner: "Posts with positive MoM impression delta and >7 days old. Top 5 surfaced into the audit narrative."
  - filename: views/late-bloomers.md
    sub_domain: views
    entry_type: framework
    one_liner: "Posts that newly entered TOP POSTS this month >30 days post-publish. Evergreen content candidates."
  - filename: views/format-decay-curves.md
    sub_domain: views
    entry_type: framework
    one_liner: "Pivot of Snapshots by Format × Days-Since-Publish bucket. Informs production allocation."

  # ============================================================
  # databases (2 entries)
  # ============================================================
  - filename: databases/monthly-audits-notion-schema.md
    sub_domain: databases
    entry_type: resource
    one_liner: "Schema for the Monthly LinkedIn Audits Notion DB (9ccff092..., DS d5206b14...). 21 properties + 8 body sections."
  - filename: databases/master-tracker-sheet-schema.md
    sub_domain: databases
    entry_type: resource
    one_liner: "Schema for the 6-tab Google Sheet (Posts Master, Snapshots, Monthly Summary, Compounders, Late Bloomers, Format Decay Curves)."

  # ============================================================
  # deep-dive (2 entries)
  # ============================================================
  - filename: deep-dive/trigger-criteria.md
    sub_domain: deep-dive
    entry_type: rule
    one_liner: "4 selection criteria for Top 5 candidates: top-5-by-absolute-impressions (default), top-5-by-mom-delta, top-5-by-engagement-rate, one-per-format."
  - filename: deep-dive/enrichment-checklist.md
    sub_domain: deep-dive
    entry_type: template
    one_liner: "6-dimension per-post enrichment workflow. Manually triggered after audit; appended to month's audit page."
